<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
margin:0;
padding:0;
font-family:"Poppins",sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.box{
width:380px;
padding:35px;
text-align:center;
background:rgba(255,255,255,0.20);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 8px 32px rgba(0,0,0,0.6);
}

h1{
letter-spacing:1px;
margin-bottom:10px;
font-size:22px;
}

label{
font-size:14px;
display:block;
text-align:left;
margin-left:8px;
}

/* Only text and password inputs */
input[type="text"],
input[type="password"]{
width:90%;
padding:12px;
margin-top:6px;
margin-bottom:15px;
border-radius:10px;
border:none;
outline:none;
font-size:14px;
}

/* Show Password Alignment */
.show{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin-bottom:15px;
}

.show input{
width:16px;
height:16px;
margin:0;
padding:0;
cursor:pointer;
}

.show label{
display:inline;
margin:0;
font-size:13px;
cursor:pointer;
}

button{
width:95%;
padding:12px;
border:none;
border-radius:12px;
background:white;
color:#4f8cff;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
transition:.3s;
}

button:hover{
background:#4f8cff;
color:white;
transform:scale(1.03);
}

a{
color:white;
text-decoration:underline;
font-size:14px;
}

</style>
</head>

<body>

<div class="box">

<h1>AI BASED STUDENT EXAM STRESS DETECTOR</h1>

<hr style="border:0;height:1px;background:white;margin-bottom:15px;">

<form onsubmit="return loginUser()">

<label>Username:</label>
<input type="text" id="username" pattern="[A-Za-z ]+" required>

<label>Password:</label>
<input type="password" id="password" minlength="8" required>

<div class="show">
<input type="checkbox" id="showPassword" onclick="showPass()">
<label for="showPassword">Show Password</label>
</div>

<button type="submit">Login</button>

<button type="button"
onclick="window.location.href='register.html'">
Register
</button>

<p>
<a href="forgotpassword.html">
Forgot Password?
</a>
</p>

</form>

</div>

<script>

function loginUser(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user=="" || pass=="")
{
alert("Enter details");
return false;
}

alert("Login Successful");

window.location.href="stress.html";

return false;

}

function showPass(){

let x=document.getElementById("password");

if(x.type==="password")
x.type="text";
else
x.type="password";

}

</script>

</body>
</html>
