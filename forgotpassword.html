<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family:"Poppins",sans-serif;
color:white;
}

.box{
width:380px;
padding:35px;
text-align:center;
background:rgba(255,255,255,0.20);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 8px 32px rgba(0,0,0,0.6);
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
margin-bottom:5px;
font-size:22px;
}

.subtitle{
font-size:13px;
opacity:0.8;
margin-bottom:15px;
}

input{
width:90%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
font-size:14px;
transition:0.3s;
}

input:focus{
box-shadow:0 0 10px rgba(79,140,255,0.7);
}

.btn{
width:95%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
background:white;
color:#4f8cff;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:#4f8cff;
color:white;
transform:scale(1.03);
}

a{
color:white;
text-decoration:underline;
font-size:14px;
}

.footer{
font-size:11px;
opacity:0.7;
margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

<div style="font-size:50px;">🎓</div>

<h2>Reset Password</h2>

<p class="subtitle">
Enter your email address to receive a reset link
</p>

<hr style="border:0;height:1px;background:white;margin-bottom:15px;">

<input
type="email"
id="email"
placeholder="Enter Email"
pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
required>

<br>

<button class="btn" onclick="resetPassword()">
Send Reset Link
</button>

<br><br>

<a href="index.html">
Back to Login
</a>

<div class="footer">
Created by Aanya Bansal
</div>

</div>

<script>

function resetPassword(){

let emailField=document.getElementById("email");

if(!emailField.checkValidity()){

alert("Please enter a valid email address.");

return;
}

alert("Reset link sent to " + emailField.value);

}

</script>

</body>
</html>
